<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Page not found — Mirabella Ceylon Gems & Jewellery." />
  <title>Page Not Found | Mirabella Ceylon</title>

  <link rel="icon" type="image/png" href="assets/images/favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Lato:wght@300;400;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="assets/css/style.css" />

  <style>
    .notfound-section {
      min-height: calc(100vh - 200px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 80px 24px;
      background: var(--off-white);
    }
    .notfound-inner {
      text-align: center;
      max-width: 560px;
    }
    .notfound-gem {
      font-size: 72px;
      color: rgba(201,168,76,0.2);
      margin-bottom: 24px;
      animation: notfoundFloat 3s ease-in-out infinite;
    }
    @keyframes notfoundFloat {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-10px); }
    }
    .notfound-code {
      font-family: var(--font-display);
      font-size: clamp(5rem, 15vw, 9rem);
      font-weight: 700;
      color: var(--gold);
      line-height: 1;
      margin-bottom: 8px;
      opacity: 0.35;
    }
    .notfound-title {
      font-family: var(--font-display);
      font-size: clamp(1.5rem, 4vw, 2.4rem);
      font-weight: 600;
      color: var(--text);
      margin-bottom: 16px;
    }
    .notfound-sub {
      font-size: 15px;
      color: var(--text-soft);
      line-height: 1.7;
      margin-bottom: 36px;
    }
    .notfound-btns {
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 40px;
    }
    .notfound-links {
      border-top: 1px solid var(--border);
      padding-top: 28px;
    }
    .notfound-links p {
      font-size: 13px;
      color: var(--text-soft);
      margin-bottom: 14px;
    }
    .notfound-links__row {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .notfound-links__row a {
      font-size: 13px;
      color: var(--gold-dark);
      text-decoration: none;
      padding: 6px 14px;
      border: 1px solid var(--border);
      border-radius: 20px;
      transition: border-color 0.2s, color 0.2s;
    }
    .notfound-links__row a:hover {
      border-color: var(--gold);
      color: var(--gold);
    }
  </style>
</head>
<body class="page-loading" data-page="404" data-header="solid">

<!-- PAGE LOADER -->
<div class="page-loader" id="pageLoader">
  <div class="loader-logo"><img src="assets/images/logo.png" alt="Mirabella Ceylon" /></div>
  <div class="loader-bar"><div class="loader-bar__fill"></div></div>
</div>

<!-- SHARED HEADER -->
<div id="mc-header"></div>


<section class="notfound-section">
  <div class="notfound-inner">
    <div class="notfound-gem" aria-hidden="true"><i class="fas fa-gem"></i></div>
    <div class="notfound-code" aria-hidden="true">404</div>
    <h1 class="notfound-title">This gem is lost in the mine</h1>
    <p class="notfound-sub">
      The page you're looking for doesn't exist, may have been moved, or the link might be incorrect. Let us guide you back to our collection.
    </p>
    <div class="notfound-btns">
      <a href="index.html" class="btn btn-primary">
        <i class="fas fa-home"></i> &nbsp;Back to Home
      </a>
      <a href="shop.html" class="btn btn-outline">
        <i class="fas fa-gem"></i> &nbsp;Browse Collections
      </a>
    </div>
    <div class="notfound-links">
      <p>Or try one of these pages:</p>
      <div class="notfound-links__row">
        <a href="index.html#about">About Us</a>
        <a href="contact.html">Contact</a>
        <a href="cart.html">Cart</a>
        <a href="wishlist.html">Wishlist</a>
        <a href="refund-policy.html">Refund Policy</a>
        <a href="privacy-policy.html">Privacy Policy</a>
      </div>
    </div>
  </div>
</section>


<!-- SHARED FOOTER -->
<div id="mc-footer"></div>

<!-- Scripts -->
<script src="assets/js/includes.js"></script>
<script src="assets/js/main.js"></script>
</body>
</html>
